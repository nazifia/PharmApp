name: pharmapp
description: "PharmApp - Pharmacy Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.3

  # Networking
  dio: ^5.9.0

  # Auth persistence (shared_preferences works cross-platform: web, Windows, Android, iOS)
  shared_preferences: ^2.3.0
  # Secure storage for JWT tokens (Keystore/Keychain on mobile+desktop; localStorage on web)
  flutter_secure_storage: ^9.2.2

  # Models (annotations only, no generation needed at runtime)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0

  # Local database (replaces Django backend for standalone operation)
  sqflite: ^2.3.3+1
  path: ^1.9.0
  crypto: ^3.0.3

  # Utils
  intl: ^0.19.0
  connectivity_plus: ^6.1.4
  image_picker: ^1.1.2
  url_launcher: ^6.3.1

  # Receipt / PDF printing
  printing: ^5.13.1
  pdf: ^3.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  msix: ^3.16.13
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  # Android
  android: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

  # iOS
  ios: true
  remove_alpha_ios: true

  # Web
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#0F172A"
    theme_color: "#0D9488"

  # Windows
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
    icon_size: 48

  # macOS
  macos:
    generate: true
    image_path: "assets/icons/app_icon.png"
