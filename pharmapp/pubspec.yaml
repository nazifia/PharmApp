name: pharmapp
description: "PharmApp - Pharmacy Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.3

  # Networking
  dio: ^5.9.0

  # Auth persistence (shared_preferences works cross-platform: web, Windows, Android, iOS)
  shared_preferences: ^2.3.0

  # Models (annotations only, no generation needed at runtime)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  connectivity_plus: ^6.1.4

  # Receipt / PDF printing
  printing: ^5.13.1
  pdf: ^3.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
